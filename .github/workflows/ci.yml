name: CI

on:
  push:
    branches: [main, rollback/calendar-stable]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DEMO_MODE: "true"
      DISABLE_AUTH: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run smoke
