name: Deploy SDR Dashboard to Hostinger

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: hostinger-sdr-production
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      DEPLOY_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      HOSTINGER_VM_ID: "1604210"
      HOSTINGER_PROJECT: sdr-project
      PUBLIC_HEALTH_URL: https://sdr.dashboardtalentera.tech/api/health
    steps:
      - name: Mark deployment pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOY_SHA,
              state: 'pending',
              context: 'hostinger/deploy',
              description: 'Deploying validated Docker release to Hostinger VPS',
              target_url: process.env.DEPLOY_URL,
            });

      - name: Checkout validated revision
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Validate Hostinger API credentials
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY || secrets.HOSTINGER_API_TOKEN }}
        run: |
          if [ -z "$HOSTINGER_API_KEY" ]; then
            echo "::error::Add HOSTINGER_API_KEY as a GitHub Actions repository secret."
            exit 1
          fi

      - name: Deploy Docker Compose through Hostinger API
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY || secrets.HOSTINGER_API_TOKEN }}
          virtual-machine: ${{ env.HOSTINGER_VM_ID }}
          project-name: ${{ env.HOSTINGER_PROJECT }}
          docker-compose-path: docker-compose.yml
          environment-variables: |
            SDR_BUILD_REF=${{ env.DEPLOY_SHA }}

      - name: Verify deployed commit and container health
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY || secrets.HOSTINGER_API_TOKEN }}
        run: |
          set +e
          API_BASE="https://developers.hostinger.com/api/vps/v1/virtual-machines/${HOSTINGER_VM_ID}/docker/${HOSTINGER_PROJECT}"
          sleep 15

          for attempt in $(seq 1 50); do
            CONTAINERS=$(curl --silent --show-error \
              --connect-timeout 3 --max-time 12 \
              -H "Authorization: Bearer ${HOSTINGER_API_KEY}" \
              -H "Accept: application/json" \
              "${API_BASE}/containers" 2>&1)
            CONTAINER_STATUS=$?

            PROJECT_LOGS=$(curl --silent --show-error \
              --connect-timeout 3 --max-time 20 \
              -H "Authorization: Bearer ${HOSTINGER_API_KEY}" \
              -H "Accept: application/json" \
              "${API_BASE}/logs" 2>&1)
            LOG_STATUS=$?

            HEALTHY_COUNT=0
            if [ "$CONTAINER_STATUS" -eq 0 ]; then
              HEALTHY_COUNT=$(printf '%s\n' "$CONTAINERS" | jq '[.[] | select(.state == "running" and .health == "healthy")] | length' 2>/dev/null)
              HEALTHY_COUNT=${HEALTHY_COUNT:-0}
            fi

            COMMIT_DEPLOYED=0
            if [ "$LOG_STATUS" -eq 0 ] \
              && printf '%s\n' "$PROJECT_LOGS" | grep -Fq "Using commit: ${DEPLOY_SHA}" \
              && printf '%s\n' "$PROJECT_LOGS" | grep -Fq "Project deployed successfully"; then
              COMMIT_DEPLOYED=1
            fi

            PUBLIC_OK=0
            if curl --fail --silent --show-error \
              --connect-timeout 3 --max-time 6 \
              "$PUBLIC_HEALTH_URL" >/tmp/public-health.json 2>/tmp/public-health.error; then
              PUBLIC_OK=1
            fi

            echo "Attempt ${attempt}: commit_deployed=${COMMIT_DEPLOYED} healthy_containers=${HEALTHY_COUNT} public_health=${PUBLIC_OK}"

            if [ "$COMMIT_DEPLOYED" -eq 1 ] && [ "$HEALTHY_COUNT" -ge 1 ]; then
              echo "Validated commit ${DEPLOY_SHA} is deployed and the Hostinger container is healthy."
              if [ "$PUBLIC_OK" -eq 1 ]; then
                cat /tmp/public-health.json
              else
                echo "::warning::The GitHub runner could not reach the public health URL, but Hostinger reports the validated container as healthy."
              fi
              exit 0
            fi

            if [ "$attempt" -eq 1 ] || [ $((attempt % 5)) -eq 0 ]; then
              echo "::group::Hostinger deployment diagnostics · attempt ${attempt}"
              if [ "$CONTAINER_STATUS" -eq 0 ]; then
                printf '%s\n' "$CONTAINERS" | jq . 2>/dev/null || printf '%s\n' "$CONTAINERS"
              else
                printf 'Unable to read container status: %s\n' "$CONTAINERS"
              fi
              printf 'Public health error: '
              cat /tmp/public-health.error 2>/dev/null || true
              echo "::endgroup::"
            fi

            sleep 8
          done

          echo "::group::Final Hostinger project logs"
          printf '%s\n' "$PROJECT_LOGS" | jq . 2>/dev/null || printf '%s\n' "$PROJECT_LOGS"
          echo "::endgroup::"
          echo "::error::The validated commit did not reach a healthy running container."
          exit 1

      - name: Mark deployment successful
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOY_SHA,
              state: 'success',
              context: 'hostinger/deploy',
              description: 'Validated commit is running in a healthy Hostinger container',
              target_url: process.env.DEPLOY_URL,
            });

      - name: Mark deployment failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOY_SHA,
              state: 'failure',
              context: 'hostinger/deploy',
              description: 'Hostinger deploy failed; review container status and logs',
              target_url: process.env.DEPLOY_URL,
            });
