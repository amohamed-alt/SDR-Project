name: Deploy SDR Dashboard to Hostinger

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: hostinger-sdr-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      DEPLOY_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      HOSTINGER_VM_ID: "1604210"
      HOSTINGER_PROJECT: sdr-project
      PUBLIC_HEALTH_URL: https://sdr.dashboardtalentera.tech/api/health
    steps:
      - name: Mark deployment pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOY_SHA,
              state: 'pending',
              context: 'hostinger/deploy',
              description: 'Deploying validated Docker release to Hostinger VPS',
              target_url: process.env.DEPLOY_URL,
            });

      - name: Checkout validated revision
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Validate Hostinger API credentials
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY || secrets.HOSTINGER_API_TOKEN }}
        run: |
          if [ -z "$HOSTINGER_API_KEY" ]; then
            echo "::error::Add HOSTINGER_API_KEY as a GitHub Actions repository secret."
            exit 1
          fi

      - name: Deploy Docker Compose through Hostinger API
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY || secrets.HOSTINGER_API_TOKEN }}
          virtual-machine: ${{ env.HOSTINGER_VM_ID }}
          project-name: ${{ env.HOSTINGER_PROJECT }}
          docker-compose-path: docker-compose.yml

      - name: Wait for containers and public health
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY || secrets.HOSTINGER_API_TOKEN }}
        run: |
          set +e
          API_BASE="https://developers.hostinger.com/api/vps/v1/virtual-machines/${HOSTINGER_VM_ID}/docker/${HOSTINGER_PROJECT}"

          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error --max-time 15 "$PUBLIC_HEALTH_URL" >/tmp/public-health.json 2>/tmp/public-health.error; then
              echo "Public health check succeeded on attempt ${attempt}."
              cat /tmp/public-health.json
              exit 0
            fi

            if [ "$attempt" -eq 1 ] || [ $((attempt % 3)) -eq 0 ]; then
              echo "::group::Hostinger container status · attempt ${attempt}"
              CONTAINERS=$(curl --silent --show-error --max-time 20 \
                -H "Authorization: Bearer ${HOSTINGER_API_KEY}" \
                -H "Accept: application/json" \
                "${API_BASE}/containers" 2>&1)
              STATUS=$?
              if [ "$STATUS" -eq 0 ]; then
                printf '%s\n' "$CONTAINERS" | jq . 2>/dev/null || printf '%s\n' "$CONTAINERS"
              else
                printf 'Unable to read container status: %s\n' "$CONTAINERS"
              fi
              printf 'Public health error: '
              cat /tmp/public-health.error 2>/dev/null || true
              echo "::endgroup::"
            fi

            sleep 10
          done

          echo "::group::Hostinger project logs"
          PROJECT_LOGS=$(curl --silent --show-error --max-time 30 \
            -H "Authorization: Bearer ${HOSTINGER_API_KEY}" \
            -H "Accept: application/json" \
            "${API_BASE}/logs" 2>&1)
          LOG_STATUS=$?
          if [ "$LOG_STATUS" -eq 0 ]; then
            printf '%s\n' "$PROJECT_LOGS" | jq . 2>/dev/null || printf '%s\n' "$PROJECT_LOGS"
          else
            printf 'Unable to read project logs: %s\n' "$PROJECT_LOGS"
          fi
          echo "::endgroup::"

          echo "::error::Docker deployment was initiated, but the public health endpoint did not become ready within 10 minutes."
          exit 1

      - name: Mark deployment successful
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOY_SHA,
              state: 'success',
              context: 'hostinger/deploy',
              description: 'Hostinger deployment and public health check succeeded',
              target_url: process.env.DEPLOY_URL,
            });

      - name: Mark deployment failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOY_SHA,
              state: 'failure',
              context: 'hostinger/deploy',
              description: 'Hostinger deploy failed; review container status and logs',
              target_url: process.env.DEPLOY_URL,
            });
